# okf-ingest knowledge-base health gate (GitHub Actions).
#
# Drop this in your repo as .github/workflows/okf.yml to keep an OKF bundle
# conformant and healthy on every push/PR. Deterministic, offline, no API key.
# Set `bundle` to your bundle path. `okf doctor --strict` exits non-zero on
# errors (and on warnings under --strict), failing the check.
name: OKF health

on:
  push:
  pull_request:

jobs:
  okf-doctor:
    runs-on: ubuntu-latest
    env:
      bundle: .            # path to your OKF bundle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install okf-ingest
      - name: Validate conformance
        run: okf validate "$bundle" --strict
      - name: Health report (non-blocking detail)
        run: okf doctor "$bundle"
      - name: Gate on errors
        run: okf doctor "$bundle" --strict
