name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install ./py[html]
      - name: Conformance suite (Python)
        run: python conformance/check_py.py
      - name: CLI smoke
        run: |
          okf validate conformance/bundles/store
          okf ingest conformance/bundles/store --db /tmp/kb.duckdb
          okf query /tmp/kb.duckdb --search revenue
          okf html conformance/bundles/store --out /tmp/site --json
          okf html conformance/bundles/store --single /tmp/bundle.html
          test -f /tmp/site/index.html && test -f /tmp/site/metrics/revenue.html && test -f /tmp/bundle.html
          grep -q 'href="../orders.html"' /tmp/site/metrics/revenue.html
          grep -q 'Linked from:' /tmp/site/orders.html
          okf graph conformance/bundles/store --out /tmp/graph.html && test -f /tmp/graph.html
          okf export conformance/bundles/store | python -c "import sys,json; d=json.load(sys.stdin); assert d['nodes'] and d['edges']"
          okf impact conformance/bundles/store orders.md | grep -q 'inbound'
          okf ingest conformance/bundles/store --db /tmp/inc.duckdb >/dev/null
          okf ingest conformance/bundles/store --db /tmp/inc.duckdb --incremental --json | grep -q '"cached"'

  R-CMD-check:
    name: R CMD check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r/okf
          extra-packages: any::rcmdcheck
      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: r/okf
          upload-snapshots: true
      - name: Conformance suite (R)
        run: Rscript conformance/check_r.R
        shell: bash
      - name: html + graph smoke (R)
        run: |
          Rscript r/okf/bin/okf.R html conformance/bundles/store --out site_r
          test -f site_r/index.html && test -f site_r/metrics/revenue.html
          grep -q 'href="../orders.html"' site_r/metrics/revenue.html
          grep -q 'Linked from:' site_r/orders.html
          Rscript r/okf/bin/okf.R graph conformance/bundles/store --out graph_r.html && test -f graph_r.html
          Rscript r/okf/bin/okf.R impact conformance/bundles/store orders.md | grep -q inbound
          Rscript r/okf/bin/okf.R ingest conformance/bundles/store --db inc_r.duckdb >/dev/null
          Rscript r/okf/bin/okf.R ingest conformance/bundles/store --db inc_r.duckdb --incremental | grep -q incremental
        shell: bash
